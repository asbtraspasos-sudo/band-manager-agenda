<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Manager | Backstage</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#ef4444">
    <meta name="description" content="Gestión premium de miembros de banda de música.">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="logo">
                <span class="gold-text">BAND</span>MANAGER
            </div>
            <div id="sync-status" class="sync-status online">Online</div>
        </header>

        <main id="main-content">
            <!-- View content will be injected here -->
            <div class="loading">Cargando...</div>
        </main>

        <nav class="bottom-nav">
            <button id="nav-list" class="nav-item active" title="Lista">Lista</button>
            <button id="nav-add" class="nav-item" title="Añadir">Añadir</button>
            <button id="nav-scores" class="nav-item nav-icon" title="Partituras">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            </button>
            <button id="nav-admin" class="nav-item" title="Admin">Admin</button>
        </nav>
    </div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- App Logic -->
    <script src="app.js" type="module"></script>
    
    <script>
        if ('serviceWorker' in navigator && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error:', err));
            });
        }
    </script>
</body>
</html>
